<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Простое приложение</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center mb-4">Простое приложение</h2>

                <!-- Форма для ввода текста -->
                <form th:action="@{/save}" method="post">
                    <div class="mb-3">
                        <label for="textInput" class="form-label">Введите текст:</label>
                        <input type="text" class="form-control" id="textInput" name="text"
                               placeholder="Введите любой текст">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Сохранить</button>
                </form>

                <!-- Отображение сохраненного текста -->
                <div class="mt-4 p-3 bg-light rounded">
                    <h5>Сохраненный текст:</h5>
                    <p th:text="${savedText}" class="fw-bold"></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
