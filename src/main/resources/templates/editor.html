<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Editor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .status-message {
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
    }
    .status-success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }
    .status-error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }
    .status-info {
        background-color: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
    }
    .mock-container {
        padding: 20px;
        background-color: #f8f9fa;
        border-radius: 5px;
        margin-bottom: 20px;
    }
    .json-textarea {
        font-family: monospace;
        font-size: 14px;
        min-height: 300px;
    }
  </style>
</head>
<body>
<div class="container-fluid py-4">
  <div class="row">
    <div class="col-12">
      <h1 class="display-6 mb-4">Редактор моков</h1>

      <!-- Статусное сообщение -->
      <div th:if="${statusMessage}" th:classappend="'status-message status-' + ${messageType}" th:text="${statusMessage}"></div>

      <div class="mock-container">
        <form th:action="@{/saveMock}" method="post">
          <div class="row">
            <div class="col-md-6">
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="enabled" name="enabled" th:checked="${savedMock?.get('enabled')} ?: true">
                <label class="form-check-label" for="enabled">Включен</label>
              </div>

              <div class="mb-3">
                <label for="gate" class="form-label">Гейт</label>
                <select class="form-select" id="gate" name="gate">
                  <option value="PRODUCT_GATE" th:selected="${savedMock?.get('gate')} == 'PRODUCT_GATE'">PRODUCT_GATE</option>
                  <option value="CONTENT_GATE" th:selected="${savedMock?.get('gate')} == 'CONTENT_GATE'">CONTENT_GATE</option>
                  <option value="USER_GATE" th:selected="${savedMock?.get('gate')} == 'USER_GATE'">USER_GATE</option>
                  <option value="CMS_GATE" th:selected="${savedMock?.get('gate')} == 'CMS_GATE'">CMS_GATE</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="httpMethod" class="form-label">HTTP метод</label>
                <select class="form-select" id="httpMethod" name="httpMethod">
                  <option value="GET" th:selected="${savedMock?.get('httpMethod')} == 'GET'">GET</option>
                  <option value="POST" th:selected="${savedMock?.get('httpMethod')} == 'POST'">POST</option>
                  <option value="PUT" th:selected="${savedMock?.get('httpMethod')} == 'PUT'">PUT</option>
                  <option value="DELETE" th:selected="${savedMock?.get('httpMethod')} == 'DELETE'">DELETE</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="requestPath" class="form-label">Путь запроса</label>
                <input type="text" class="form-control" id="requestPath" name="requestPath" th:value="${savedMock?.get('requestPath')}">
              </div>
            </div>

            <div class="col-md-6">
              <div class="mb-3">
                <label for="responseStatus" class="form-label">Статус ответа</label>
                <select class="form-select" id="responseStatus" name="responseStatus">
                  <option value="200" th:selected="${savedMock?.get('responseStatus')} == 200">200</option>
                  <option value="404" th:selected="${savedMock?.get('responseStatus')} == 404">404</option>
                  <option value="500" th:selected="${savedMock?.get('responseStatus')} == 500">500</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="priority" class="form-label">Приоритет</label>
                <input type="number" class="form-control" id="priority" name="priority" th:value="${savedMock?.get('priority')} ?: 1">
              </div>

              <div class="mb-3">
                <label for="description" class="form-label">Описание</label>
                <input type="text" class="form-control" id="description" name="description" th:value="${savedMock?.get('description')}">
              </div>

              <div class="mb-3">
                <label for="mockGroup" class="form-label">Группа моков</label>
                <input type="text" class="form-control" id="mockGroup" name="mockGroup" th:value="${savedMock?.get('mockGroup')}">
              </div>
            </div>
          </div>

          <div class="row mt-4">
            <div class="col-12">
              <label for="responseBody" class="form-label">Тело ответа</label>
              <textarea class="form-control json-textarea" id="responseBody" name="responseBody" rows="12" th:text="${savedMock?.get('responseBody')} ?: '{}'"></textarea>
            </div>
          </div>

          <div class="row mt-4">
            <div class="col-12">
              <button type="submit" class="btn btn-success">✅ Сохранить мок</button>
              <a th:href="@{/clearMock}" class="btn btn-danger">⚠️ Очистить мок</a>
            </div>
          </div>
        </form>
      </div>

      <div class="mock-container" th:if="${savedMock} and !${savedMock.isEmpty()}">
        <h5>Текущий мок (сохранен в переменной):</h5>
        <pre class="bg-light p-3" th:text="${#maps.toString(savedMock)}"></pre>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
